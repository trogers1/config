# Worktree helpers
# Use Meta+Space as the tmux prefix for this workflow.
set -g prefix M-Space
unbind C-b

# Create/switch a normal dev session in current repo/path.
bind N run-shell 'cd #{pane_current_path} && dev-local'

# Prompt for a new branch, then create/switch to a worktree session.
bind W command-prompt -p "new branch" "run-shell 'cd #{pane_current_path} && dev-wt-new %%'"

# Merge current branch back into main and clean up worktree/session.
bind M run-shell 'cd #{pane_current_path} && dev-wt-merge'
