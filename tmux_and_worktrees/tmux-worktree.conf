# Worktree helpers
# Use Meta+Space as the tmux prefix for this workflow.
set -g prefix M-Space
unbind C-b

# Create/switch a normal dev session in current repo/path.
bind N run-shell 'cd #{pane_current_path} && dnew'
unbind n
bind n run-shell 'cd #{pane_current_path} && dnew'

# Prompt for a new branch, then create/switch to a worktree session.
bind W command-prompt -p "new branch (default is current):" "run-shell 'cd \"#{pane_current_path}\" && dtree %%'"
unbind t
bind t command-prompt -p "new branch (default is current):" "run-shell 'cd \"#{pane_current_path}\" && dtree %%'"

# Merge current branch and clean up worktree/session.
# Use send-keys so dmerge can prompt for interactive target selection.
bind M send-keys 'dmerge' C-m
